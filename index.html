<style>

:root{
    --navy:#021C45;
    --navy-secondary:#032049;
    --gold:#CEA55E;

    --gray:#636A73;
    --gray-light:#969BA4;

    --white:#FDFDFD;
    --light:#F8FAFC;
    --border:#D9DDE3;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    color:var(--navy);
    line-height:1.6;
    background:var(--white);
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* ===========================
   NAVIGATION
=========================== */

header{
    background:var(--white);
    border-bottom:3px solid var(--gold);
    position:sticky;
    top:0;
    z-index:1000;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
}

.logo-img{
    height:75px;
    width:auto;
    display:block;
}

nav ul{
    display:flex;
    list-style:none;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:var(--navy);
    font-weight:600;
    font-size:1rem;
    transition:.2s;
}

nav a:hover{
    color:var(--gold);
}

/* ===========================
   HERO
=========================== */

.hero{
    background:
    linear-gradient(
        rgba(2,28,69,.95),
        rgba(3,32,73,.90)
    );
    color:white;
    text-align:center;
    padding:140px 20px;
}

.hero h1{
    font-size:3.2rem;
    margin-bottom:20px;
}

.hero p{
    max-width:800px;
    margin:auto;
    font-size:1.2rem;
}

.button{
    display:inline-block;
    margin-top:35px;
    padding:15px 30px;
    background:var(--gold);
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:600;
    transition:.25s;
}

.button:hover{
    background:#B8924D;
}

/* ===========================
   SECTIONS
=========================== */

section{
    padding:90px 0;
}

.section-title{
    text-align:center;
    font-size:2rem;
    color:var(--navy);
    margin-bottom:60px;
}

.section-title:after{
    content:'';
    display:block;
    width:80px;
    height:3px;
    background:var(--gold);
    margin:15px auto 0;
}

.gray{
    background:var(--light);
}

/* ===========================
   CARDS
=========================== */

.grid{
    display:grid;
    gap:25px;
}

.services{
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
}

.experience-grid{
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

.card{
    background:white;
    border:1px solid var(--border);
    border-radius:10px;
    padding:30px;
    transition:.25s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 20px rgba(2,28,69,.08);
}

.card h3{
    margin-bottom:12px;
    color:var(--navy);
}

/* ===========================
   BIO
=========================== */

.bio{
    display:grid;
    grid-template-columns:300px 1fr;
    gap:50px;
    align-items:center;
}

.bio img{
    width:100%;
    border-radius:12px;
}

/* ===========================
   CONTACT FORM
=========================== */

.contact-form{
    max-width:700px;
    margin:auto;
}

input,
textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid var(--border);
    border-radius:6px;
}

button{
    background:var(--gold);
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#B8924D;
}

/* ===========================
   FOOTER
=========================== */

footer{
    background:var(--navy);
    color:white;
    text-align:center;
    padding:40px 20px;
    border-top:3px solid var(--gold);
}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

    nav{
        flex-direction:column;
        gap:20px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h1{
        font-size:2.2rem;
    }

    .bio{
        grid-template-columns:1fr;
        text-align:center;
    }
}

</style>
